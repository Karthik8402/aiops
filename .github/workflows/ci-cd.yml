name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Lint, Compile & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       aiops_test
          POSTGRES_USER:     aiops
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compile and Run SpotBugs Static Analysis
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/aiops_test
          SPRING_DATASOURCE_USERNAME: aiops
          SPRING_DATASOURCE_PASSWORD: test
          KAFKA_BROKERS:              localhost:9092
          JWT_SECRET:                 test-secret-not-real-but-needs-to-be-long-enough-32-bytes
        run: mvn compile spotbugs:check

      - name: Run Backend Unit Tests
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/aiops_test
          SPRING_DATASOURCE_USERNAME: aiops
          SPRING_DATASOURCE_PASSWORD: test
          KAFKA_BROKERS:              localhost:9092
          JWT_SECRET:                 test-secret-not-real-but-needs-to-be-long-enough-32-bytes
        run: mvn test

  frontend-test:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aiops-dashboard/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: aiops-dashboard
        run: npm ci

      - name: Run Frontend Lint (oxlint)
        working-directory: aiops-dashboard
        run: npm run lint

      - name: Run Frontend Production Build
        working-directory: aiops-dashboard
        run: npm run build
