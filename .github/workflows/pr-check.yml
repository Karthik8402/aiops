name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       aiops_test
          POSTGRES_USER:     aiops
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/aiops_test
          SPRING_DATASOURCE_USERNAME: aiops
          SPRING_DATASOURCE_PASSWORD: test
          KAFKA_BROKERS:              localhost:9092
          JWT_SECRET:                 test-secret-not-real-but-needs-to-be-long-enough-32-bytes
        run: mvn -q test
