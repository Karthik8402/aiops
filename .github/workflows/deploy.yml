name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aiops-platform

jobs:
  build:
    name: Build Docker image (ARM64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build Spring Boot JAR
        run: mvn -q package -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image (linux/arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Compose files to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key:      ${{ secrets.ORACLE_SSH_KEY }}
          source:   "docker-compose.yml,docker-compose.prod.yml,Caddyfile,prometheus/,grafana/"
          target:   "/home/ubuntu/aiops-platform"

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key:      ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/aiops-platform

            cat > .env <<EOF
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            EOF
            chmod 600 .env

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull app

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-deps app

            echo "Waiting for app to become healthy..."
            timeout 60 bash -c \
              'until curl -sf http://localhost:8080/actuator/health | grep -q UP; do sleep 3; done'

            echo "✅ Deployment successful"
            docker image prune -f
