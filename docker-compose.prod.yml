version: "3.9"

services:

  kafka:
    restart: unless-stopped
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 1600m

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  app:
    environment:
      SPRING_PROFILES_ACTIVE: demo
      JAVA_OPTS: "-Xmx768m -Xms256m -XX:+UseZGC"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1400m

  prometheus:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  caddy:
    restart: unless-stopped
